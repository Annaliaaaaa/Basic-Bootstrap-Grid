<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --dark-blue: #5b1e70;
            --light-green: #5b1e70;
            --yellow: #ffffff;
            --orange: #ffffff;
            --salmon: #ffffff;
        }

        .container {
            color: var(--dark-blue);
            font-size: 20px;
            font-weight: bold;
            min-height: 100vh;
            background-color: var(--yellow);
        }

        .row {
            border: 1px solid var(--dark-blue);
            min-height: 50px;
        }

        [class^="col"] {
            border: 1px solid var(--light-green);
            min-height: 50px;
        }
    </style>
</head>

<body>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="container">
        <div class="row">
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
            <div class="col-1 bg-primary-subtle"></div>
        </div>
        <div class="row">
            <div class="col-3 bg-danger-subtle"></div>
            <div class="col-3 bg-danger-subtle"></div>
            <div class="col-3 bg-danger-subtle"></div>
            <div class="col-3 bg-danger-subtle"></div>
        </div>
        <div class="row">
            <div class="col-4 bg-warning-subtle"></div>
            <div class="col-4 bg-warning-subtle"></div>
            <div class="col-4 bg-warning-subtle"></div>
        </div>
        <div class="row">
            <div class="col-2 bg-light-subtle"></div>
            <div class="col-2 bg-light-subtle"></div>
            <div class="col-4 bg-light-subtle"></div>
            <div class="col-2 bg-light-subtle"></div>
            <div class="col-2 bg-light-subtle"></div>
        </div>
        <div class="row">
            <div class="col-6 bg-primary"></div>
            <div class="col-6 bg-primary"></div>
        </div>
        <div class="row">
            <div class="col-12 bg-success"></div>
        </div>
    </div>

</body>

</html>
